<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" href="css/cadastro.css" />
    <title>Cadastro</title>
  </head>
  <body>

  <header class="header">
    <div class="container header-content">
    <div class="logo"> <img src="assets/imgs/logoEcoCup.png" alt="logo"></div>
    <nav class="menu">
        <ul>
          <li><a href="index.html">Início</a></li>
          <li><a href="produtos.html">Produtos</a></li>
          <li><a href="quem-somos.html">Quem Somos</a></li>
          <li><a href="cadastro.html">Cadastre-se</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="#" id="theme-toggle">🌙</a></li>
        </ul>

    </nav>
  </header>

    <div class="container">
      <div class="card">
        <h1>Cadastre-se</h1>

        <div id="msgError"></div>
        <div id="msgSuccess"></div>

        <div class="label-float">
          <input type="text" id="nome" placeholder=" " required/>
          <label id="labelNome"  for="nome">Nome Completo</label>
        </div>

        <div class="label-float">
          <input type="text" id="usuario" placeholder=" " required/>
          <label id="labelUsuario" for="usuario">Usuário</label>
        </div>

        <div class="label-float">
          <input type="text" id="nome-materno" nome="nome-materno" placeholder=" " required>
          <label for="nome-materno" id="labelNome-materno">Nome Materno</label>
        </div>

        <div class="label-float">
            <input type="email" id="email" placeholder=" " required/>
            <label id="labelEmail"  for="email">E-mail</label>
        </div>

        <div class="label-float">
          <input type="text" id="cpf" nome="cpf"  pattern="\d{11}" placeholder="Somente números" required>
          <label for="cpf" id="labelCpf">CPF</label>
        </div>

        <div class="label-float">
          <label for="data-nascimento" id="labelData-nascimento">Data de Nascimento</label>
          <input type="date" id="data-nascimento" name="data-nascimento" required> 
        </div>

        <div class="label-float">
          <label for="sexo">Sexo:</label>
            <select id="sexo" name="sexo" required>
              <option value="">Selecione</option>
              <option value="feminino">Feminino</option>
              <option value="masculino">Masculino</option>
              <option value="outro">Outro</option>
              <option value="nao-informar">Prefiro não informar</option>
            </select>
        </div>

        <div class="label-float">
          <input type="tel" id="celular" nome="celular" placeholder="(DDD) 9XXXX-XXXX" required >
          <label for="celular" id="labelCelular">Número de Celular</label>
        </div>

        <div class="label-float">
          <input type="tel" id="telefone" nome="telefone" placeholder="(DDD) XXXX-XXXX" required>
          <label for="telefone" id="labelTelefone">Telefone Fixo</label>
        </div>

        <div class="label-float">
          <input type="text" id="endereco" nome="endereco" placeholder=" " required>
          <label for="endereco" id="labelEndereco">Endereço Completo</label>
        </div>

        <div class="label-float">
          <input type="password" id="senha" placeholder=" " required/>
          <label id="labelSenha" for="senha">Senha</label>
          <i id="verSenha" class="fa fa-eye" aria-hidden="true"></i>
        </div>

        <div class="label-float">
          <input type="password" id="confirmSenha" placeholder=" " required/>
          <label id="labelConfirmSenha" for="confirmSenha"
            >Confirmar Senha</label
          >
          <i id="verConfirmSenha" class="fa fa-eye" aria-hidden="true"></i>
        </div>

        <div class="justify-center">
          <button onclick="cadastrar()">Cadastrar</button>
        </div>
      </div>
    </div>
    
    <script src="js/cadastro-script.js"></script>

  </body>
</html>
