<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Detalhes do Produto - EcoCup</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="container header-content">
      <div class="logo">
        <img src="assets/imgs/logoEcoCup.png" alt="Logo da EcoCup">
      </div>
      <nav class="menu">
        <ul>
          <li><a href="index.html">Início</a></li>
          <li><a href="produtos.html">Produtos</a></li>
          <li><a href="quem-somos.html">Quem Somos</a></li>
          <li><a href="cadastro.html">Cadastre-se</a></li>
          <li><a href="login.html">Login</a></li>
        </ul>
      </nav>
      <button id="theme-toggle" class="btn-toggle-theme">🌙</button>
    </div>
  </header>

  <main class="container produto-detalhe">
    <div class="detalhes">
      <!-- Imagem do Produto -->
      <div class="imagem-produto">
        <img src="assets/imgs/produto1.jpg" alt="Imagem do Produto">
      </div>

      <!-- Informações do Produto -->
      <div class="info-produto">
        <h1>Copo de Papel Sustentável</h1>
        <p class="descricao">
          Copo biodegradável feito com fibras vegetais, ideal para bebidas quentes e frias. Produto ecológico e resistente.
        </p>
        
        <p><strong>Preço:</strong> R$ 4,50 (unidade)</p>

        <!-- Quantidade -->
        <label for="quantidade">Quantidade:</label>
        <input type="number" id="quantidade" name="quantidade" min="1" value="1"><br><br>

        <!-- CEP -->
        <label for="cep">Calcular Frete (CEP):</label>
        <input type="text" id="cep" name="cep" placeholder="00000-000"><br><br>

        <!-- Botões -->
        <button class="btn">Adicionar ao Carrinho 🛒</button>
        <button class="btn">Comprar Agora 💳</button>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2025 EcoCup Unisuam - Todos os direitos reservados.</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
